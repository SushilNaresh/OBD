# OBD runtime configuration
# Format: key=value

report_ip=10.20.10.119
report_port=5080
default_proxy=10.20.10.119
local_ip=10.20.10.119
rtp_ip=127.0.0.1
listen_port=3061
heartbeat_port=10070

# SIP ports
sip_port_base=15060
sip_mux_port=5060
proxy_port=5060
rtp_base_port=20000

# Dispatcher routing threads — JSON parse + dedup + route per packet
# Increase if pktq_dropped > 0 in dispatcher_rate logs
routing_threads=16

# SIP timers
sip_t1_ms=200
sip_t2_ms=1600

# Cancel timer after 180 Ringing (ms) — how long to wait before sending CANCEL
# Default: 500ms. Increase if carrier needs more time to ring before detecting result.
cancel_ring_ms=2000

# Call behavior
require_100rel=yes
default_proxy=10.20.10.119
use_rtp=no
use_mux=no

# SIP diagnostics (0=silent, 1=error, 2=warn, 3=info, 4=debug, 5=trace, 6=detail)
sip_log_level=1        # ← set to 5 to debug proxy routing, revert to 0 in production
log_file=/u03/photonlogs/obd_runtime.log

# Log rotation
obd_log_level=5
log_rotate_size_mb=500   # rotate when file exceeds this size in MB (default: 100)
log_rotate_count=40      # number of rotated backup files to keep (default: 5)
